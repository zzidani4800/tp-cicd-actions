name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Job 1 : Appel du workflow CI (Réutilisable)
  # Note : Pour que cela fonctionne, votre fichier ci.yml doit avoir 'workflow_call:' dans ses déclencheurs 'on'
  ci:
    name: Validation CI
    uses: ./.github/workflows/ci.yml

  # Job 2 : Déploiement uniquement si le CI est réussi
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Téléchargement de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          # Assurez-vous d'avoir un dossier 'public' avec un index.html
          path: public/

      - name: Déploiement vers GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4