name: CI - Build & Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call: # Permet l'appel par d'autres workflows
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Installer Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer le linting
        run: npm run lint

      - name: Lancer les tests avec couverture
        run: npm test
      
      - name: Upload du rapport de couverture
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7